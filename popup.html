<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Настройки</title>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #000;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    button:hover {
      background: #0b5ed7;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #28a745;
      text-align: center;
    }
  </style>
</head>
<body>
  <label>Ваше имя (как будет отображаться в таблице):</label>
  <input type="text" id="userName" placeholder="Введите ваше имя" autocomplete="off">
  <button id="save">Сохранить</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
